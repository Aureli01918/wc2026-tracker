<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WC2026 Tracker</title>
<meta name="description" content="A simple tracker for the 2026 World Cup.">
<meta name="theme-color" content="#0b3d2e">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #0b3d2e;
    --fg: #ffffff;
    --accent: #ffd60a;
    --card: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.1);
    --live: #ff3b30;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  header { text-align: center; margin-bottom: 1.5rem; }
  h1 { margin: 0; font-size: 1.8rem; }
  p.tagline { opacity: 0.8; margin-top: 0.25rem; }
  main {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .schedule-section {
    background: var(--card);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .section-head { margin-bottom: 0.5rem; }
  .section-head h2 {
    margin: 0;
    font-size: 1.05rem;
    color: var(--accent);
  }
  ul.match-list { list-style: none; padding: 0; margin: 0; }
  ul.match-list li.match-row {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid var(--border);
  }
  ul.match-list li.match-row:last-child { border-bottom: none; }
  .match-time { font-size: 0.8rem; opacity: 0.8; }
  .match-teams { font-weight: 600; display: flex; align-items: center; flex-wrap: wrap; }
  .match-meta { font-size: 0.8rem; opacity: 0.7; }
  .vs-sep { opacity: 0.6; }
  li.match-empty {
    padding: 0.75rem 0;
    font-style: italic;
    opacity: 0.7;
  }

  /* Flags */
  .flag {
    display: inline-block;
    width: 1.35em;
    height: 1em;
    margin-right: 0.4em;
    vertical-align: -0.15em;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
    background: rgba(255,255,255,0.15);
  }
  .flag svg { display: block; width: 100%; height: 100%; object-fit: cover; }
  .team-name { white-space: normal; }

  /* Playing now */
  li.playing-row .live-badge {
    align-self: flex-start;
    background: var(--live);
    color: #fff;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    margin-bottom: 0.2rem;
  }
  .match-note { font-size: 0.78rem; opacity: 0.75; font-style: italic; }

  /* Results */
  .match-score-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    font-weight: 600;
    flex-wrap: wrap;
  }
  .match-score-wrap .team { display: flex; align-items: center; flex: 1; min-width: 0; }
  .match-score-wrap .team2 { justify-content: flex-end; text-align: right; }
  .match-score-wrap .team2 .team-name { order: -1; margin-right: 0.4em; }
  .match-score-wrap .team2 .flag { margin-right: 0; margin-left: 0.4em; }
  .scoreline {
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
    padding: 0 0.3rem;
  }
  .match-goals {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    font-size: 0.78rem;
    opacity: 0.85;
    margin-top: 0.3rem;
  }
  .team-goals { flex: 1; min-width: 0; }
  .team-goals:last-child { text-align: right; }
  .scorers-list { list-style: none; margin: 0; padding: 0; }
  .scorers-list li { line-height: 1.4; }

  #refresh-btn {
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #0b3d2e;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
  }
  #refresh-btn:disabled {
    opacity: 0.6;
    cursor: default;
  }
  #status, #sw-status {
    font-size: 0.9rem;
    text-align: center;
    color: var(--accent);
    margin: 0.5rem 0 0;
    min-height: 1.2em;
  }
</style>
</head>
<body>
  <header>
    <h1>🏆 WC2026 Tracker</h1>
    <p class="tagline">Your scoreboard for the 2026 World Cup</p>
  </header>

  <main>
    <section class="schedule-section">
      <div class="section-head">
        <h2>Playing now</h2>
      </div>
      <ul id="playing-matches" class="match-list">
        <li class="match-empty">Loading&hellip;</li>
      </ul>
    </section>

    <section class="schedule-section">
      <div class="section-head">
        <h2>Today</h2>
      </div>
      <ul id="today-matches" class="match-list">
        <li class="match-empty">Loading&hellip;</li>
      </ul>
    </section>

    <section class="schedule-section">
      <div class="section-head">
        <h2>Upcoming</h2>
      </div>
      <ul id="upcoming-matches" class="match-list">
        <li class="match-empty">Loading&hellip;</li>
      </ul>
    </section>

    <section class="schedule-section">
      <div class="section-head">
        <h2>Results</h2>
      </div>
      <ul id="results-matches" class="match-list">
        <li class="match-empty">Loading&hellip;</li>
      </ul>
    </section>

    <button id="refresh-btn" type="button">Refresh schedule</button>
  </main>

  <p id="status">Loading schedule&hellip;</p>
  <p id="sw-status"></p>

  <script src="flags.js" defer></script>
  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(() => {
            const el = document.getElementById('sw-status');
            if (el) el.textContent = 'Ready to work offline';
          })
          .catch((err) => {
            console.error('Service worker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
