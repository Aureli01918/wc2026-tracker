<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WC2026 Tracker</title>
<meta name="description" content="A simple tracker for the 2026 World Cup.">
<meta name="theme-color" content="#082b20">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
:root {
  --bg: #082b20;
  --bg-soft: #0d3a2a;
  --fg: #ffffff;
  --accent: #d4af37;
  --accent-soft: #e6c768;
  --card: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.1);
  --live: #ff3b30;
}
* { box-sizing: border-box; }
/* Several elements below use display:flex on their class but are toggled
   via the native `hidden` attribute -- without this rule, the class's
   display:flex wins over the browser's default [hidden]{display:none} and
   the element stays visibly on screen even while "hidden". */
[hidden] { display: none !important; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: radial-gradient(ellipse at top, var(--bg-soft) 0%, var(--bg) 55%);
  color: var(--fg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
}
header { text-align: center; margin-bottom: 1.5rem; }
h1 {
  margin: 0;
  font-size: 1.8rem;
  letter-spacing: 0.01em;
  text-shadow: 0 2px 16px rgba(212,175,55,0.3);
}
p.tagline { opacity: 0.8; margin-top: 0.25rem; }
main {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.schedule-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem;
  box-shadow: 0 8px 24px rgba(0,0,0,0.28);
}
.section-head { margin-bottom: 0.5rem; }
.section-head h2 {
  margin: 0;
  font-size: 1.05rem;
  color: var(--accent);
}
ul.match-list { list-style: none; padding: 0; margin: 0; }
ul.match-list li.match-row {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border);
}
ul.match-list li.match-row:last-child { border-bottom: none; }
.match-time { font-size: 0.8rem; opacity: 0.8; }
.match-teams { font-weight: 600; display: flex; align-items: center; flex-wrap: wrap; }
.match-meta { font-size: 0.8rem; opacity: 0.7; }
.vs-sep { opacity: 0.6; }
li.match-empty {
  padding: 0.75rem 0;
  font-style: italic;
  opacity: 0.7;
}

/* Flags */
.flag {
  display: inline-block;
  width: 1.35em;
  height: 1em;
  margin-right: 0.4em;
  vertical-align: -0.15em;
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
  background: rgba(255,255,255,0.15);
}
.flag svg { display: block; width: 100%; height: 100%; object-fit: cover; }
.team-name { white-space: normal; }

/* Playing now */
li.playing-row .live-badge {
  align-self: flex-start;
  background: var(--live);
  color: #fff;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
  margin-bottom: 0.2rem;
}
.match-note { font-size: 0.78rem; opacity: 0.75; font-style: italic; }

/* Results */
.match-score-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  font-weight: 600;
  flex-wrap: wrap;
}
.match-score-wrap .team { display: flex; align-items: center; flex: 1; min-width: 0; }
.match-score-wrap .team2 { justify-content: flex-end; text-align: right; }
.match-score-wrap .team2 .team-name { order: -1; margin-right: 0.4em; }
.match-score-wrap .team2 .flag { margin-right: 0; margin-left: 0.4em; }
.scoreline {
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
  padding: 0 0.3rem;
}
.match-goals {
  display: flex;
  justify-content: space-between;
  gap: 0.75rem;
  font-size: 0.78rem;
  opacity: 0.85;
  margin-top: 0.3rem;
}
.team-goals { flex: 1; min-width: 0; }
.team-goals:last-child { text-align: right; }
.scorers-list { list-style: none; margin: 0; padding: 0; }
.scorers-list li { line-height: 1.4; }

#refresh-btn {
  width: 100%;
  padding: 0.75rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: var(--bg);
  font-weight: 600;
  font-size: 0.95rem;
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
}
#refresh-btn:hover:not(:disabled) { filter: brightness(1.08); }
#refresh-btn:active:not(:disabled) { transform: scale(0.98); }
#refresh-btn:disabled {
  opacity: 0.6;
  cursor: default;
}
#status, #sw-status {
  font-size: 0.9rem;
  text-align: center;
  color: var(--accent);
  margin: 0.5rem 0 0;
  min-height: 1.2em;
}

/* Offline banner */
.offline-banner {
  font-size: 0.85rem;
  text-align: center;
  color: var(--accent);
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.4rem 0.6rem;
  margin: 0.5rem 0 0;
}

/* Loading skeleton */
.skeleton-list { display: flex; flex-direction: column; gap: 0.6rem; }
.skeleton-row {
  height: 2.6rem;
  border-radius: 8px;
  background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.14) 37%, rgba(255,255,255,0.06) 63%);
  background-size: 400% 100%;
  animation: skeleton-shimmer 1.4s ease infinite;
}
@keyframes skeleton-shimmer {
  0% { background-position: 100% 50%; }
  100% { background-position: 0 50%; }
}

/* Feed error */
.feed-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  text-align: center;
  padding: 1rem 0;
}
.feed-error p { margin: 0; opacity: 0.85; }
.retry-btn {
  padding: 0.5rem 1rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: var(--fg);
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
}
.retry-btn:hover { background: rgba(255,255,255,0.18); }
.retry-btn:active { transform: scale(0.97); }

/* Day browser */
.day-browser { display: flex; flex-direction: column; gap: 0.85rem; }

.quick-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.quick-filter-btn {
  flex: 1 1 auto;
  padding: 0.5rem 0.6rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  color: var(--fg);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s ease, transform 0.1s ease;
}
.quick-filter-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); }
.quick-filter-btn:active:not(:disabled) { transform: scale(0.97); }
.quick-filter-btn:disabled { opacity: 0.45; cursor: default; }

.day-nav { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
.day-nav-btn {
  flex-shrink: 0;
  width: 2.25rem;
  height: 2.25rem;
  border: none;
  border-radius: 999px;
  background: var(--accent);
  color: var(--bg);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.1s ease;
}
.day-nav-btn:hover:not(:disabled) { filter: brightness(1.08); }
.day-nav-btn:active:not(:disabled) { transform: scale(0.95); }
.day-nav-btn:disabled { opacity: 0.4; cursor: default; }
#day-label { margin: 0; font-size: 1rem; text-align: center; color: var(--accent); flex: 1; }

/* Notifications */
.notify-section { display: flex; flex-direction: column; gap: 0.6rem; }
.notify-btn, .copy-btn {
  padding: 0.65rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: var(--bg);
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.1s ease;
}
.notify-btn:hover, .copy-btn:hover { filter: brightness(1.08); }
.notify-btn:active, .copy-btn:active { transform: scale(0.98); }
.copy-btn { background: rgba(255,255,255,0.12); color: var(--fg); border: 1px solid var(--border); }
#notify-status { font-size: 0.85rem; opacity: 0.85; margin: 0; min-height: 1.2em; }
.subscription-display { display: flex; flex-direction: column; gap: 0.5rem; }
.subscription-textarea {
  width: 100%;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 0.72rem;
  background: rgba(0,0,0,0.25);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem;
  resize: vertical;
}

/* Group standings */
.standings-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.standings-head h2 { margin: 0; font-size: 1.05rem; color: var(--accent); }
.standings-select {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--fg);
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.35rem 0.5rem;
}
.standings-table-wrap { overflow-x: auto; }
.standings-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.standings-table th, .standings-table td {
  padding: 0.45rem 0.4rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.standings-table th {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  opacity: 0.7;
  font-weight: 600;
}
.standings-team-head, .standings-team { text-align: left; white-space: normal; }
.standings-team { display: flex; align-items: center; font-weight: 600; }
.standings-pos { opacity: 0.7; font-weight: 600; }
.standings-pts { font-weight: 700; color: var(--accent); }
tr.standings-qualify { background: rgba(212,175,55,0.08); }
tr.standings-row:last-child td { border-bottom: none; }
.standings-note { font-size: 0.78rem; opacity: 0.7; margin: 0.6rem 0 0; }
</style>
</head>
<body>
<header>
<h1>🏆 WC2026 Tracker</h1>
<p class="tagline">Your scoreboard for the 2026 World Cup</p>
</header>

<main>
<section class="schedule-section day-browser" id="day-browser">
<div class="quick-filters">
<button id="quick-today-btn" type="button" class="quick-filter-btn">Today</button>
<button id="quick-live-btn" type="button" class="quick-filter-btn" disabled>Live now (0)</button>
<button id="quick-next-btn" type="button" class="quick-filter-btn" disabled>Next match</button>
<button id="quick-latest-btn" type="button" class="quick-filter-btn" disabled>Latest result</button>
</div>

<div class="day-nav">
<button id="day-prev-btn" type="button" class="day-nav-btn" aria-label="Previous day">&larr;</button>
<h2 id="day-label">Loading&hellip;</h2>
<button id="day-next-btn" type="button" class="day-nav-btn" aria-label="Next day">&rarr;</button>
</div>

<ul id="day-skeleton" class="match-list skeleton-list" aria-hidden="true">
<li class="skeleton-row"></li>
<li class="skeleton-row"></li>
<li class="skeleton-row"></li>
</ul>

<ul id="day-matches" class="match-list" hidden>
<li class="match-empty">Loading&hellip;</li>
</ul>

<div id="feed-error" class="feed-error" hidden>
<p id="feed-error-text">Unable to load the match schedule.</p>
<button id="retry-btn" type="button" class="retry-btn">Retry</button>
</div>
</section>

<button id="refresh-btn" type="button">Refresh schedule</button>

<section class="schedule-section standings-section" id="standings-section">
<div class="standings-head">
<h2>Group Standings</h2>
<select id="standings-group-select" class="standings-select" aria-label="Select group"></select>
</div>
<div class="standings-table-wrap">
<table class="standings-table">
<thead>
<tr>
<th class="standings-pos">#</th>
<th class="standings-team-head">Team</th>
<th class="standings-num">P</th>
<th class="standings-num">W</th>
<th class="standings-num">D</th>
<th class="standings-num">L</th>
<th class="standings-num">GD</th>
<th class="standings-num">Pts</th>
</tr>
</thead>
<tbody id="standings-body"></tbody>
</table>
</div>
<p class="standings-note">Top 2 in each group advance to the knockout stage.</p>
</section>

<section class="schedule-section notify-section" id="notify-section">
<div class="section-head"><h2>Notifications</h2></div>
<button id="enable-notifications-btn" type="button" class="notify-btn">Enable notifications</button>
<p id="notify-status"></p>
<div id="subscription-display" class="subscription-display" hidden>
<textarea id="subscription-json" class="subscription-textarea" readonly rows="6"></textarea>
<button id="copy-subscription-btn" type="button" class="copy-btn">Copy subscription JSON</button>
</div>
</section>
</main>

<p id="status">Loading schedule&hellip;</p>
<p id="offline-banner" class="offline-banner" hidden></p>
<p id="sw-status"></p>

<script src="flags.js" defer></script>
<script src="app.js" defer></script>
<script>
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
.then(() => {
const el = document.getElementById('sw-status');
if (el) el.textContent = 'Ready to work offline';
})
.catch((err) => {
console.error('Service worker registration failed:', err);
});
});
}
</script>
</body>
</html>
