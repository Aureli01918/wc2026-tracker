<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WC2026 Tracker</title>
<meta name="description" content="A simple tracker for the 2026 World Cup.">
<meta name="theme-color" content="#0B1F17">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
:root {
  --canvas: #0B1F17;
  --tile: #142A1E;
  --tile-press: #193320;
  --gold: #D4AF37;
  --gold-dim: rgba(212,175,55,.16);
  --ink: #F3F1E9;
  --muted: #93A89A;
  --hairline: rgba(243,241,233,.08);
  --ease: cubic-bezier(.2,.7,.2,1);
  --live: #ff3b30;
}
* { box-sizing: border-box; }
/* Several elements below use display:flex on their class but are toggled
   via the native `hidden` attribute -- without this rule, the class's
   display:flex wins over the browser's default [hidden]{display:none} and
   the element stays visibly on screen even while "hidden". */
[hidden] { display: none !important; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--canvas);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem;
}
header { text-align: center; margin-bottom: 1.5rem; }
h1 {
  margin: 0;
  font-size: 1.8rem;
  letter-spacing: 0.01em;
  text-shadow: 0 2px 16px var(--gold-dim);
  color: var(--ink);
}
p.tagline { opacity: 0.75; margin-top: 0.25rem; color: var(--muted); }
main {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.schedule-section {
  background: rgba(20,42,30,0.55);
  border: 1px solid var(--hairline);
  border-radius: 18px;
  padding: 1.25rem;
  box-shadow: 0 10px 30px -18px rgba(0,0,0,0.6);
}
.section-head { margin-bottom: 0.5rem; }
.section-head h2 {
  margin: 0;
  font-size: 1.05rem;
  color: var(--gold);
}
ul.match-list { list-style: none; padding: 0; margin: 0; }
li.match-empty {
  padding: 0.75rem 0;
  font-style: italic;
  opacity: 0.7;
  color: var(--muted);
}

/* Flags */
.flag {
  display: inline-flex;
  width: 28px;
  height: 20px;
  flex-shrink: 0;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(243,241,233,0.25);
  background: rgba(255,255,255,0.06);
}
.flag svg { display: block; width: 100%; height: 100%; object-fit: cover; }
.flag-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 20px;
  flex-shrink: 0;
  border-radius: 4px;
  background: var(--gold-dim);
  color: var(--gold);
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.01em;
  border: 1px solid rgba(212,175,55,0.35);
}
.team-name { white-space: normal; }

#refresh-btn {
  width: 100%;
  padding: 0.75rem;
  border: none;
  border-radius: 10px;
  background: var(--gold);
  color: var(--canvas);
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
}
#refresh-btn:hover:not(:disabled) { filter: brightness(1.08); }
#refresh-btn:active:not(:disabled) { transform: scale(0.98); }
#refresh-btn:disabled {
  opacity: 0.6;
  cursor: default;
}
#status, #sw-status {
  font-size: 0.9rem;
  text-align: center;
  color: var(--muted);
  margin: 0.5rem 0 0;
  min-height: 1.2em;
}

/* Offline banner */
.offline-banner {
  font-size: 0.85rem;
  text-align: center;
  color: var(--gold);
  background: rgba(243,241,233,0.06);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 0.4rem 0.6rem;
  margin: 0.5rem 0 0;
}

/* Loading skeleton -- soft-depth shimmer tiles */
.skeleton-list { display: flex; flex-direction: column; gap: 0.65rem; }
.skeleton-row {
  height: 4.4rem;
  border-radius: 16px;
  background: linear-gradient(100deg, var(--tile) 30%, rgba(212,175,55,0.14) 50%, var(--tile) 70%);
  background-size: 250% 100%;
  animation: skeleton-shimmer 1.6s ease infinite;
}
@keyframes skeleton-shimmer {
  0% { background-position: 120% 0; }
  100% { background-position: -20% 0; }
}

/* Feed error */
.feed-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.6rem;
  text-align: center;
  padding: 1rem 0;
}
.feed-error p { margin: 0; opacity: 0.85; color: var(--muted); }
.retry-btn {
  padding: 0.5rem 1rem;
  border: 1px solid var(--hairline);
  border-radius: 8px;
  background: rgba(243,241,233,0.08);
  color: var(--ink);
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
}
.retry-btn:hover { background: rgba(243,241,233,0.16); }
.retry-btn:active { transform: scale(0.97); }

/* Day browser */
.day-browser { display: flex; flex-direction: column; gap: 0.85rem; }

/* Tab bar (quick-filters) with sliding gold underline */
.quick-filters {
  position: relative;
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  padding-bottom: 0.55rem;
  border-bottom: 1px solid var(--hairline);
}
.tab-btn {
  flex: 1 1 auto;
  padding: 0.5rem 0.45rem;
  border: none;
  border-radius: 8px;
  background: none;
  color: var(--muted);
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 0.01em;
  cursor: pointer;
  white-space: nowrap;
  transition: color 200ms var(--ease), background 200ms var(--ease), transform 0.1s ease;
}
.tab-btn:hover:not(:disabled) { color: var(--ink); background: rgba(243,241,233,0.05); }
.tab-btn:active:not(:disabled) { transform: scale(0.97); }
.tab-btn:disabled { opacity: 0.4; cursor: default; }
.tab-btn.is-active { color: var(--gold); }
.tab-underline {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  width: 0;
  background: var(--gold);
  border-radius: 2px;
  opacity: 0;
  transition: left 320ms var(--ease), width 320ms var(--ease), opacity 200ms var(--ease);
}
.tab-underline.is-visible { opacity: 1; }

.day-nav { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
.day-nav-btn {
  flex-shrink: 0;
  width: 2.25rem;
  height: 2.25rem;
  border: none;
  border-radius: 999px;
  background: var(--gold);
  color: var(--canvas);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.1s ease;
}
.day-nav-btn:hover:not(:disabled) { filter: brightness(1.08); }
.day-nav-btn:active:not(:disabled) { transform: scale(0.95); }
.day-nav-btn:disabled { opacity: 0.4; cursor: default; }
#day-label { margin: 0; font-size: 1rem; text-align: center; color: var(--gold); flex: 1; }

/* Day-change slide transition */
#day-matches { view-transition-name: day-matches; }
@keyframes day-slide-in-fwd {
  from { opacity: 0; transform: translateX(18px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes day-slide-in-back {
  from { opacity: 0; transform: translateX(-18px); }
  to { opacity: 1; transform: translateX(0); }
}
.day-slide-in-fwd { animation: day-slide-in-fwd 320ms var(--ease); }
.day-slide-in-back { animation: day-slide-in-back 320ms var(--ease); }

::view-transition-old(day-matches),
::view-transition-new(day-matches) {
  animation-duration: 320ms;
  animation-timing-function: cubic-bezier(.2,.7,.2,1);
}
html[data-day-dir="forward"]::view-transition-old(day-matches) { animation-name: vt-out-left; }
html[data-day-dir="forward"]::view-transition-new(day-matches) { animation-name: vt-in-right; }
html[data-day-dir="back"]::view-transition-old(day-matches) { animation-name: vt-out-right; }
html[data-day-dir="back"]::view-transition-new(day-matches) { animation-name: vt-in-left; }
@keyframes vt-out-left { to { opacity: 0; transform: translateX(-18px); } }
@keyframes vt-in-right { from { opacity: 0; transform: translateX(18px); } to { opacity: 1; transform: translateX(0); } }
@keyframes vt-out-right { to { opacity: 0; transform: translateX(18px); } }
@keyframes vt-in-left { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: translateX(0); } }

/* ---- Match card (soft-depth tile) ---------------------------------- */
.match-card {
  list-style: none;
  background: var(--tile);
  border-radius: 16px;
  box-shadow: 0 10px 22px -16px rgba(0,0,0,.75), inset 0 1px 0 rgba(243,241,233,.06);
  margin-bottom: 0.65rem;
  overflow: hidden;
}
.match-card:last-child { margin-bottom: 0; }

.match-card-header {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 0.95rem 1rem;
  margin: 0;
  cursor: pointer;
  font: inherit;
  color: inherit;
  transition: background 160ms var(--ease), transform 160ms var(--ease);
}
.match-card-header:hover { background: rgba(243,241,233,0.03); }
.match-card-header:active { background: var(--tile-press); transform: scale(0.985); }
.match-card-header:focus-visible { outline: 2px solid var(--gold); outline-offset: -2px; }

.status-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.5rem; }
.status-text { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; }

.live-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35em;
  background: var(--gold-dim);
  color: var(--gold);
  border-radius: 999px;
  padding: 0.18em 0.6em 0.18em 0.45em;
  font-weight: 700;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.live-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: live-pulse 1.4s ease-in-out infinite;
}
@keyframes live-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.35; transform: scale(1.35); }
}

.chevron {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: var(--muted);
  transition: transform 280ms var(--ease);
}
.match-card-header[aria-expanded="true"] .chevron { transform: rotate(180deg); }

.card-body { display: flex; align-items: stretch; gap: 0.5rem; }
.teams-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.team-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.16rem 0; min-width: 0; }
.team-abbr {
  width: 34px;
  flex-shrink: 0;
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.team-name {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--ink);
  font-size: 0.92rem;
}
.team-name.winner { font-weight: 700; }

.score-col, .kickoff-col-wrap {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-end;
  flex-shrink: 0;
  gap: 0.16rem;
}
.score-value {
  font-variant-numeric: tabular-nums;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.35;
  min-width: 1.2em;
  text-align: right;
}
.kickoff-time {
  font-variant-numeric: tabular-nums;
  font-size: 0.88rem;
  color: var(--muted);
  align-self: center;
}

/* Expansion */
.match-card-expand {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 340ms var(--ease);
}
.match-card-header[aria-expanded="true"] + .match-card-expand { grid-template-rows: 1fr; }
.match-card-expand-inner { overflow: hidden; min-height: 0; }
.expand-content { padding: 0 1rem 1.1rem; }
.expand-divider { height: 1px; background: var(--hairline); margin: 0 0 0.85rem; }

.scorers-block, .meta-block, .group-table-block { margin-bottom: 0.9rem; }
.group-table-block { margin-bottom: 0; }
.scorers-block h4, .meta-block h4, .group-table-block h4 {
  margin: 0 0 0.5rem;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  font-weight: 700;
}
.scorer-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 0.6rem;
  padding: 0.26rem 0;
  font-size: 0.85rem;
  color: var(--ink);
  opacity: 0;
  transform: translateY(6px);
  animation: scorer-in 320ms var(--ease) forwards;
  animation-delay: calc(var(--row-index, 0) * 60ms);
}
.scorer-row .scorer-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.scorer-row .scorer-minute { color: var(--gold); font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
@keyframes scorer-in { to { opacity: 1; transform: translateY(0); } }

.meta-block dl { margin: 0; }
.meta-row { display: flex; justify-content: space-between; gap: 0.75rem; padding: 0.32rem 0; border-bottom: 1px solid var(--hairline); font-size: 0.82rem; }
.meta-row:last-child { border-bottom: none; }
.meta-row dt { color: var(--muted); margin: 0; flex-shrink: 0; }
.meta-row dd { margin: 0; color: var(--ink); text-align: right; }

.group-table-block table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
.group-table-block th, .group-table-block td {
  padding: 0.34rem 0.3rem;
  text-align: center;
  white-space: nowrap;
}
.group-table-block th {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  font-weight: 700;
}
.group-table-block .gt-team-head, .group-table-block .gt-team { text-align: left; white-space: normal; }
.group-table-block .gt-team { display: flex; align-items: center; gap: 0.4rem; }
.group-table-block .gt-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.group-table-block tr.gt-highlight { background: var(--gold-dim); }
.group-table-block tr.gt-highlight .gt-name { font-weight: 700; }
.group-table-block tr.gt-qualify td:first-child { box-shadow: inset 3px 0 0 var(--gold); }
.group-table-block tr:last-child td { border-bottom: none; }

/* Notifications */
.notify-section { display: flex; flex-direction: column; gap: 0.6rem; }
.notify-btn, .copy-btn {
  padding: 0.65rem;
  border: none;
  border-radius: 10px;
  background: var(--gold);
  color: var(--canvas);
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.1s ease;
}
.notify-btn:hover, .copy-btn:hover { filter: brightness(1.08); }
.notify-btn:active, .copy-btn:active { transform: scale(0.98); }
.copy-btn { background: rgba(243,241,233,0.1); color: var(--ink); border: 1px solid var(--hairline); }
#notify-status { font-size: 0.85rem; opacity: 0.85; margin: 0; min-height: 1.2em; color: var(--muted); }
.subscription-display { display: flex; flex-direction: column; gap: 0.5rem; }
.subscription-textarea {
  width: 100%;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 0.72rem;
  background: rgba(0,0,0,0.25);
  color: var(--ink);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 0.6rem;
  resize: vertical;
}

/* Group standings (main section) */
.standings-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
.standings-head h2 { margin: 0; font-size: 1.05rem; color: var(--gold); }
.standings-select {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink);
  background: rgba(243,241,233,0.1);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 0.35rem 0.5rem;
}
.standings-table-wrap { overflow-x: auto; }
.standings-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.standings-table th, .standings-table td {
  padding: 0.45rem 0.4rem;
  text-align: center;
  border-bottom: 1px solid var(--hairline);
  white-space: nowrap;
}
.standings-table th {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  opacity: 0.8;
  color: var(--muted);
  font-weight: 600;
}
.standings-team-head, .standings-team { text-align: left; white-space: normal; }
.standings-team { display: flex; align-items: center; font-weight: 600; gap: 0.4rem; }
.standings-pos { opacity: 0.7; font-weight: 600; color: var(--muted); }
.standings-pts { font-weight: 700; color: var(--gold); }
tr.standings-qualify { background: var(--gold-dim); }
tr.standings-row:last-child td { border-bottom: none; }
.standings-note { font-size: 0.78rem; opacity: 0.7; margin: 0.6rem 0 0; color: var(--muted); }

/* Respect reduced-motion: disable all animation/transition motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>
<body>
<header>
<h1>🏆 WC2026 Tracker</h1>
<p class="tagline">Your scoreboard for the 2026 World Cup</p>
</header>

<main>
<section class="schedule-section day-browser" id="day-browser">
<div class="quick-filters" id="quick-filters">
<button id="quick-today-btn" type="button" class="tab-btn">Today</button>
<button id="quick-live-btn" type="button" class="tab-btn" disabled>Live now (0)</button>
<button id="quick-next-btn" type="button" class="tab-btn" disabled>Next match</button>
<button id="quick-latest-btn" type="button" class="tab-btn" disabled>Latest result</button>
<span class="tab-underline" id="tab-underline" aria-hidden="true"></span>
</div>

<div class="day-nav">
<button id="day-prev-btn" type="button" class="day-nav-btn" aria-label="Previous day">&larr;</button>
<h2 id="day-label">Loading&hellip;</h2>
<button id="day-next-btn" type="button" class="day-nav-btn" aria-label="Next day">&rarr;</button>
</div>

<ul id="day-skeleton" class="match-list skeleton-list" aria-hidden="true">
<li class="skeleton-row"></li>
<li class="skeleton-row"></li>
<li class="skeleton-row"></li>
</ul>

<ul id="day-matches" class="match-list" hidden>
<li class="match-empty">Loading&hellip;</li>
</ul>

<div id="feed-error" class="feed-error" hidden>
<p id="feed-error-text">Unable to load the match schedule.</p>
<button id="retry-btn" type="button" class="retry-btn">Retry</button>
</div>
</section>

<button id="refresh-btn" type="button">Refresh schedule</button>

<section class="schedule-section standings-section" id="standings-section">
<div class="standings-head">
<h2>Group Standings</h2>
<select id="standings-group-select" class="standings-select" aria-label="Select group"></select>
</div>
<div class="standings-table-wrap">
<table class="standings-table">
<thead>
<tr>
<th class="standings-pos">#</th>
<th class="standings-team-head">Team</th>
<th class="standings-num">P</th>
<th class="standings-num">W</th>
<th class="standings-num">D</th>
<th class="standings-num">L</th>
<th class="standings-num">GD</th>
<th class="standings-num">Pts</th>
</tr>
</thead>
<tbody id="standings-body"></tbody>
</table>
</div>
<p class="standings-note">Top 2 in each group advance to the knockout stage.</p>
</section>

<section class="schedule-section notify-section" id="notify-section">
<div class="section-head"><h2>Notifications</h2></div>
<button id="enable-notifications-btn" type="button" class="notify-btn">Enable notifications</button>
<p id="notify-status"></p>
<div id="subscription-display" class="subscription-display" hidden>
<textarea id="subscription-json" class="subscription-textarea" readonly rows="6"></textarea>
<button id="copy-subscription-btn" type="button" class="copy-btn">Copy subscription JSON</button>
</div>
</section>
</main>

<p id="status">Loading schedule&hellip;</p>
<p id="offline-banner" class="offline-banner" hidden></p>
<p id="sw-status"></p>

<script src="flags.js" defer></script>
<script src="app.js" defer></script>
<script>
if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
.then(() => {
const el = document.getElementById('sw-status');
if (el) el.textContent = 'Ready to work offline';
})
.catch((err) => {
console.error('Service worker registration failed:', err);
});
});
}
</script>
</body>
</html>
